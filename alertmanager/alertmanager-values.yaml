alertmanager:
  config:
    route:
      routes:
      - receiver: jenkins-scale-up
        matchers:
          - autoscale_action="scale_up"
          - severity="skaling"        
        continue: false
      - receiver: jenkins-scale-down
        matchers:
          - autoscale_action="scale_down"
          - severity="skaling"
        continue: false
        repeat_interval: 12h

    receivers:
      - name: jenkins-scale-up
        webhook_configs:
          - url: "https://jenkins.medevelop.studio/generic-webhook-trigger/invoke?token=scale-up"
            send_resolved: false
      - name: jenkins-scale-down
        webhook_configs:
          - url: "https://jenkins.medevelop.studio/generic-webhook-trigger/invoke?token=scale-down"
            send_resolved: false