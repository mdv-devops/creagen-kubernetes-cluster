apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hetzner-node-autoscaler
  namespace: monitoring
  labels:
    release: monitoring

spec:
  groups:
    - name: hetzner-node-autoscaler
      rules:
        - alert: HetznerK8sScaleUp
          expr: |
            (
              avg(
                (
                  (
                    100 - (
                      avg by(instance) (
                        rate(node_cpu_seconds_total{mode="idle"}[5m])
                      ) * 100
                    )
                  )
                  * on(instance) group_left(node)
                  label_replace(
                    kube_node_info{node=~".*-worker-.*"},
                    "instance",
                    "$1:9100",
                    "internal_ip",
                    "(.+)"
                  )
                )
              ) > 85
            )
            or
            (
              avg(
                (
                  (
                    (
                      1 -
                      (
                        node_memory_MemAvailable_bytes
                        /
                        node_memory_MemTotal_bytes
                      )
                    ) * 100
                  )
                  * on(instance) group_left(node)
                  label_replace(
                    kube_node_info{node=~".*-worker-.*"},
                    "instance",
                    "$1:9100",
                    "internal_ip",
                    "(.+)"
                  )
                )
              ) > 90
            )
          for: 3m
          labels:
            severity: warning
            autoscale_action: scale_up
          annotations:
            summary: "Scale up worker nodes"
            description: |
              Average worker node CPU > 85%
              OR
              average worker node memory > 90%
              for 3 minutes.

        - alert: HetznerK8sScaleDown
          expr: |
            (
              avg(
                (
                  (
                    100 - (
                      avg by(instance) (
                        rate(node_cpu_seconds_total{mode="idle"}[5m])
                      ) * 100
                    )
                  )
                  * on(instance) group_left(node)
                  label_replace(
                    kube_node_info{node=~".*-worker-.*"},
                    "instance",
                    "$1:9100",
                    "internal_ip",
                    "(.+)"
                  )
                )
              ) < 55
            )
            and
            (
              avg(
                (
                  (
                    (
                      1 -
                      (
                        node_memory_MemAvailable_bytes
                        /
                        node_memory_MemTotal_bytes
                      )
                    ) * 100
                  )
                  * on(instance) group_left(node)
                  label_replace(
                    kube_node_info{node=~".*-worker-.*"},
                    "instance",
                    "$1:9100",
                    "internal_ip",
                    "(.+)"
                  )
                )
              ) < 70
            )
          for: 5m
          labels:
            severity: warning
            autoscale_action: scale_down
          annotations:
            summary: "Scale down worker nodes"
            description: |
              Average worker node CPU < 55%
              AND
              average worker node memory < 70%
              for 5 minutes.