apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-stress

spec:
  replicas: 2

  selector:
    matchLabels:
      app: memory-stress

  template:
    metadata:
      labels:
        app: memory-stress

    spec:
      nodeSelector:
        nodepool: worker

      containers:
        - name: stress

          image: polinux/stress

          command:
            - sh
            - -c
            - |
              stress --vm 1 --vm-bytes 2G --vm-keep

          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"

            limits:
              memory: "3Gi"
              cpu: "1"